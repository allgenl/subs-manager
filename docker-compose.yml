version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: subsmanager
      POSTGRES_USER: subs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_IN_ENV}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - '127.0.0.1:5433:5432'
    mem_limit: 256m
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U subs -d subsmanager']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://subs:${DB_PASSWORD:-CHANGE_ME_IN_ENV}@db:5432/subsmanager
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

volumes:
  pgdata:
